<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KC NAPIZA | Portfolio</title>
    <style>
        /* Base Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif; 
            background-color: #000; 
            color: #fff; 
            overflow-x: hidden; 
            scroll-behavior: smooth; 
        }

        nav { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            padding: 30px 50px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background-color: rgba(0, 0, 0, 0.9); 
            backdrop-filter: blur(10px); 
            z-index: 1000; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .nav-links { display: flex; gap: 40px; list-style: none; }
        .nav-links a { color: #888; text-decoration: none; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .nav-links a:hover { color: #fff; }

        .hero { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            position: relative;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.15; 
            pointer-events: none;
        }
        .hero-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;

            transform: translateY(-250px) translateX(-10px); 
            
            
        }

        .hero-content p {
            transform: translateX(15px) translateY(-5px);
    
        }

        
        .main-logo {
            width: 70%;
            max-width: 1500px;
            height: auto;
            margin-bottom: -215px; 
            animation: fadeIn 1.5s ease-out;
        }

        .hero p { 
            font-size: 18px; 
            color: #666; 
            letter-spacing: 2px; 
            text-transform: uppercase;
            margin-top: 0; 
        }

        .hero-icon {
            width: 250px;
            height: auto;
            margin-top: -20px;
            opacity: 0.6;
            transform:translateX(13px) translateY(-40px);
        }


        .tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 60px; padding-top: 100px; flex-wrap: wrap; }
        .tab { padding: 12px 30px; background: transparent; border: 1px solid #333; color: #666; cursor: pointer; border-radius: 30px; transition: 0.3s; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .tab.active { background: #fff; color: #000; border-color: #fff; }


        .projects-container { max-width: 1200px; margin: 0 auto; padding: 0 50px; min-height: 50vh; }
        .project { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 60px; margin-bottom: 120px; align-items: center; }
        .project:nth-child(even) { direction: rtl; }
        .project:nth-child(even) .project-info { direction: ltr; }
        
        .project-media { width: 100%; aspect-ratio: 16/9; background: #111; border-radius: 10px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .project-media video { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .project-info h3 { font-size: 32px; margin-bottom: 15px; letter-spacing: 1px; }
        .project-description { font-size: 16px; line-height: 1.8; color: #888; }
        

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }


        @media (max-width: 900px) {
            .project { grid-template-columns: 1fr; gap: 30px; }
            .project:nth-child(even) { direction: ltr; }
            nav { padding: 20px; }
            .main-logo { width: 85%; margin-bottom: -40px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">KC NAPIZA.</div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#work">Work</a></li>
        </ul>
    </nav>

    <section id="home" class="hero">

        <div class="hero-bg">
            <img src="anime-outline-bg.png" alt="">
        </div>


        <div class="hero-content">
            <img src="png/KISE_00007.png" class="main-logo" alt="KISE Logo">
            <p>Motion Graphics & Creative Design</p>
            <img src="png/v1_00007.png" class="hero-icon" alt="Decoration">
        </div>
    </section>

    <section id="work">
        <div class="tabs">
            <button class="tab active" onclick="setCategory('logo')">Logo Animation</button>
            <button class="tab" onclick="setCategory('text')">Text Animation</button>
            <button class="tab" onclick="setCategory('drawing')">Drawing Animation</button>
        </div>

        <div id="projects-grid" class="projects-container">
        </div>
    </section>

    <script>
        let allProjects = [];

        async function fetchProjects() {
            try {
                const response = await fetch('projects.json?t=' + Date.now());
                allProjects = await response.json();
                render('logo');
            } catch (error) {
                console.error("Could not load projects:", error);
                document.getElementById('projects-grid').innerHTML = 
                "<p style='text-align:center;color:#444;padding-top:50px;'>Create a projects.json file to see your work.</p>";
            }
        }

        function render(category) {
            const container = document.getElementById('projects-grid');
            container.innerHTML = ''; 

            const filtered = allProjects.filter(p => p.category === category);

            if (filtered.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#444; padding-top: 50px;">No projects added in this category yet.</p>`;
                return;
            }

            filtered.forEach(p => {
                const html = `
                    <div class="project">
                        <div class="project-media">
                            <video controls preload="metadata">
                                <source src="${p.url}" type="video/mp4">
                                Your browser does not support the video tag.
                            </video>
                        </div>
                        <div class="project-info">
                            <h3>${p.title}</h3>
                            <p class="project-description">${p.description}</p>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function setCategory(cat) {
            document.querySelectorAll('.tab').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase().includes(cat));
            });
            render(cat);
        }

        window.onload = fetchProjects;
    </script>
</body>
</html>
